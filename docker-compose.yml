services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-recruitment}
      POSTGRES_USER: ${POSTGRES_USER:-recruitment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recruitment}
    ports:
      # Host port 5434 to avoid clashing with other local Postgres instances.
      # The backend container (if used) still connects on 5432 via POSTGRES_HOST=db.
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recruitment}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - resume_storage:/app/storage
      - app_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  resume_storage:
  app_logs:
